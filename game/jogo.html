<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelda: Ocarina of Time</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: block; }
        #game-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        window.EJS_player = '#game-container';
        window.EJS_core = 'n64'; // Mudando para o motor da Nintendo 64
        window.EJS_gameUrl = 'zelda.zip'; // Caminho para a ROM do Zelda na mesma pasta (game)
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; // Ficheiros base do emulador
        window.EJS_language = 'en-US'; // Remove os alertas de tradução não encontrada
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
