<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | C.O.R.I.N.O.</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="brand" style="text-align: center; margin-bottom: 30px;">
            <h1 class="logo" style="font-size: 32px;">🌲 DIFLOR</h1>
            <p class="subtitle">C.O.R.I.N.O.</p>
        </div>
        
        <div class="filter-group" style="margin-bottom: 20px;">
            <label>Utilizador</label>
            <input type="text" id="username" placeholder="Digite o seu utilizador" onkeypress="verificarEnter(event)" style="text-align: left;">
        </div>
        
        <div class="filter-group" style="margin-bottom: 30px;">
            <label>Palavra-passe</label>
            <input type="password" id="password" placeholder="••••••••" onkeypress="verificarEnter(event)" style="width: 100%; height: 42px; padding: 0 12px; border-radius: 6px; border: 1px solid #333; background-color: #1a1a1a; color: white; outline: none;">
        </div>

        <div id="login-error" style="color: #ff4b4b; font-size: 13px; text-align: center; margin-bottom: 15px; display: none;">
            Utilizador ou palavra-passe incorretos.
        </div>

        <button class="btn-export-full" style="background-color: var(--primary-green); color: white; border: none;" onclick="fazerLogin()">
            Entrar no Sistema
        </button>
    </div>

    <script>
        // URL DO SEU GOOGLE APPS SCRIPT
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz5hhx7nkslps7RiAtIiuxO76xvKefMhIFe8iy1zZXgS229Nbxbct9P1shpLs0Xekgt/exec';

        async function fazerLogin() {
            const user = document.getElementById('username').value.toLowerCase().trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('login-error');
            const btnLogin = document.querySelector('.btn-export-full');

            if (!user || !pass) {
                errorMsg.innerText = "Por favor, preencha o utilizador e a palavra-passe.";
                errorMsg.style.display = 'block';
                return;
            }

            // Feedback visual de carregamento
            btnLogin.innerText = "A validar credenciais...";
            btnLogin.disabled = true;
            btnLogin.style.opacity = '0.7';
            errorMsg.style.display = 'none';

            try {
                // Envia os dados de login para o servidor (Google Apps Script)
                const resposta = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        acao: "login", 
                        username: user, 
                        password: pass 
                    })
                });

                const resultado = await resposta.json();

                if (resultado.status === 'success') {
                    // Login com sucesso: guarda os dados na sessão
                    const dadosUsuario = {
                        username: user,
                        perfil: resultado.perfil,
                        nomePlanilha: resultado.nomePlanilha
                    };
                    
                    sessionStorage.setItem('corino_user', JSON.stringify(dadosUsuario));
                    window.location.href = 'index.html'; 
                } else {
                    // Erro: Credenciais inválidas
                    errorMsg.innerText = resultado.message || "Utilizador ou palavra-passe incorretos.";
                    errorMsg.style.display = 'block';
                    restaurarBotaoLogin(btnLogin);
                }
            } catch (erro) {
                // Erro de falha na internet ou erro no servidor
                console.error("Erro no login:", erro);
                errorMsg.innerText = "Erro de comunicação com o servidor. Verifique a internet ou o link do script.";
                errorMsg.style.display = 'block';
                restaurarBotaoLogin(btnLogin);
            }
        }

        function restaurarBotaoLogin(btn) {
            btn.innerText = "Entrar no Sistema";
            btn.disabled = false;
            btn.style.opacity = '1';
        }

        function verificarEnter(event) {
            if (event.key === "Enter") fazerLogin();
        }
    </script>
</body>
</html>
